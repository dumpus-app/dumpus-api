services:
  db:
    container_name: dumpus-db
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT}:5432"

    healthcheck:
      test: ["CMD-SHELL", "PGUSER=dumpus", "pg_isready"]
      interval: 5s
      timeout: 10s
      retries: 5

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: ${POSTGRES_DB}

    restart: on-failure
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    container_name: dumpus-api
    build:
      dockerfile: Dockerfile.api

    ports:
      - "${API_PORT}:5000"
    depends_on:
      db:
        condition: service_healthy
        restart: true

    # Local dev runs the worker in-process: enqueue_package() calls process_package()
    # synchronously. In production, the API Lambda enqueues to SQS instead.
    environment:
      QUEUE_BACKEND: sync
      POSTGRES_URL: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASS}@db:5432/dumpus"
      DL_ZIP_TMP_PATH: ${DL_ZIP_TMP_PATH}
      DL_ZIP_WHITELISTED_DOMAINS: ${DL_ZIP_WHITELISTED_DOMAINS}
      DISWHO_BASE_URL: ${DISWHO_BASE_URL}
      DISWHO_JWT_SECRET: ${DISWHO_JWT_SECRET}
      DISCORD_SECRET: ${DISCORD_SECRET}

volumes:
  postgres-data:
